name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          # 임시 키체인 생성
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 인증서 import
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm "$RUNNER_TEMP/cert.p12"

          # 키체인 검색 목록에 추가, 파티션 설정
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$(security list-keychains -d user | tr -d '"')"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build universal binary
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          # BundledCredentials.local.swift를 CI Secret으로 생성
          printf 'extension BundledCredentials {\n    static let _localClientID = "%s"\n    static let _localClientSecret = "%s"\n}\n' \
            "$GOOGLE_CLIENT_ID" "$GOOGLE_CLIENT_SECRET" \
            > Planit/Services/BundledCredentials.local.swift

          swift build -c release --arch arm64 --arch x86_64

      - name: Create .app bundle
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          BUILD_DIR=".build/apple/Products/Release"
          APP_BUNDLE="$BUILD_DIR/Calen.app"

          rm -rf "$APP_BUNDLE"
          mkdir -p "$APP_BUNDLE/Contents/MacOS"
          mkdir -p "$APP_BUNDLE/Contents/Resources"

          # 고정폭 단조 증가 빌드 번호 (major*10000 + minor*100 + patch)
          read V_MAJOR V_MINOR V_PATCH < <(echo "$VERSION" | awk -F. '{printf "%d %d %d\n", $1+0, $2+0, $3+0}')
          BUILD_NUMBER=$((V_MAJOR * 10000 + V_MINOR * 100 + V_PATCH))

          cp "$BUILD_DIR/Calen" "$APP_BUNDLE/Contents/MacOS/Calen"
          cp "Planit/Info.plist" "$APP_BUNDLE/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$APP_BUNDLE/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$APP_BUNDLE/Contents/Info.plist"
          cp "Planit/Resources/AppIcon.icns" "$APP_BUNDLE/Contents/Resources/AppIcon.icns"

          if [ -f "Planit/Resources/PrivacyInfo.xcprivacy" ]; then
            cp "Planit/Resources/PrivacyInfo.xcprivacy" "$APP_BUNDLE/Contents/Resources/"
          fi
          if [ -d "$BUILD_DIR/Calen_Calen.bundle" ]; then
            cp -R "$BUILD_DIR/Calen_Calen.bundle" "$APP_BUNDLE/Contents/Resources/"
          fi
          # lproj를 소스에서 직접 복사 → Bundle.main이 찾을 수 있도록
          for lproj in Planit/Resources/*.lproj; do
            [ -d "$lproj" ] && cp -R "$lproj" "$APP_BUNDLE/Contents/Resources/"
          done

          # Sparkle.framework 번들링
          SPARKLE_SRC=".build/artifacts/sparkle/Sparkle/Sparkle.xcframework/macos-arm64_x86_64/Sparkle.framework"
          if [ -d "$SPARKLE_SRC" ]; then
            mkdir -p "$APP_BUNDLE/Contents/Frameworks"
            rm -rf "$APP_BUNDLE/Contents/Frameworks/Sparkle.framework"
            ditto "$SPARKLE_SRC" "$APP_BUNDLE/Contents/Frameworks/Sparkle.framework"
            echo "✓ Sparkle.framework embedded"
          else
            echo "✗ Sparkle.framework artifact not found at $SPARKLE_SRC" >&2
            exit 1
          fi

          echo "APP_BUNDLE=$APP_BUNDLE" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"

      - name: Code sign (inside-out for Sparkle)
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
        run: |
          SPARKLE_FW="$APP_BUNDLE/Contents/Frameworks/Sparkle.framework"
          # XPC services → Autoupdate → Updater.app → framework 순서
          for xpc in "$SPARKLE_FW/Versions/B/XPCServices"/*.xpc; do
            [ -d "$xpc" ] && codesign --force --options runtime --timestamp \
              --preserve-metadata=identifier,entitlements,flags \
              --sign "$DEVELOPER_ID" "$xpc"
          done
          codesign --force --options runtime --timestamp --sign "$DEVELOPER_ID" \
            "$SPARKLE_FW/Versions/B/Autoupdate"
          codesign --force --options runtime --timestamp --sign "$DEVELOPER_ID" \
            "$SPARKLE_FW/Versions/B/Updater.app"
          codesign --force --options runtime --timestamp --sign "$DEVELOPER_ID" "$SPARKLE_FW"

          # 메인 앱 마지막
          codesign --force --options runtime \
            --entitlements "Planit/Planit.entitlements" \
            --sign "$DEVELOPER_ID" \
            --timestamp \
            "$APP_BUNDLE"
          codesign --verify --deep --strict --verbose=2 "$APP_BUNDLE"

      - name: Sparkle static check
        run: scripts/sparkle-static-check.sh "$APP_BUNDLE"

      - name: Create zip for notarization
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          BUILD_DIR=".build/apple/Products/Release"
          ZIP_NAME="Calen-${VERSION}-universal.zip"
          cd "$BUILD_DIR"
          ditto -c -k --keepParent "Calen.app" "$ZIP_NAME"
          echo "ZIP_PATH=$BUILD_DIR/$ZIP_NAME" >> "$GITHUB_ENV"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Notarize
        env:
          NOTARIZE_APPLE_ID: ${{ secrets.NOTARIZE_APPLE_ID }}
          NOTARIZE_PASSWORD: ${{ secrets.NOTARIZE_PASSWORD }}
          NOTARIZE_TEAM_ID: ${{ secrets.NOTARIZE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$NOTARIZE_APPLE_ID" \
            --password "$NOTARIZE_PASSWORD" \
            --team-id "$NOTARIZE_TEAM_ID" \
            --wait

          xcrun stapler staple "$APP_BUNDLE"

          # 공증 완료 후 zip 재생성 (staple된 앱)
          BUILD_DIR=".build/apple/Products/Release"
          cd "$BUILD_DIR"
          rm -f "$ZIP_NAME"
          ditto -c -k --keepParent "Calen.app" "$ZIP_NAME"

      - name: Create DMG
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          BUILD_DIR=".build/apple/Products/Release"
          DMG_NAME="Calen-${VERSION}-universal.dmg"
          STAGING="$BUILD_DIR/dmg-staging"

          rm -rf "$STAGING" && mkdir -p "$STAGING"
          cp -R "$APP_BUNDLE" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "Calen" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$BUILD_DIR/$DMG_NAME"
          rm -rf "$STAGING"

          echo "DMG_PATH=$BUILD_DIR/$DMG_NAME" >> "$GITHUB_ENV"
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Compute checksums
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          ZIP_SHA=$(shasum -a 256 "$ZIP_PATH" | awk '{print $1}')
          DMG_SHA=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')
          echo "ZIP_SHA=$ZIP_SHA" >> "$GITHUB_ENV"
          echo "DMG_SHA=$DMG_SHA" >> "$GITHUB_ENV"
          echo "ZIP SHA256: $ZIP_SHA"
          echo "DMG SHA256: $DMG_SHA"

      - name: Sign Sparkle update (EdDSA)
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          if [ -z "${SPARKLE_ED_PRIVATE_KEY:-}" ]; then
            echo "⚠️  SPARKLE_ED_PRIVATE_KEY secret 미설정 — appcast 서명/갱신 건너뜀"
            echo "SPARKLE_SIGNED=false" >> "$GITHUB_ENV"
            exit 0
          fi
          SIGN_UPDATE=".build/artifacts/sparkle/Sparkle/bin/sign_update"
          KEY_FILE="$RUNNER_TEMP/sparkle_ed_key"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          SIGN_OUTPUT=$("$SIGN_UPDATE" -f "$KEY_FILE" "$ZIP_PATH")
          rm -f "$KEY_FILE"
          ED_SIG=$(echo "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          LENGTH=$(echo "$SIGN_OUTPUT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')
          if [ -z "$ED_SIG" ] || [ -z "$LENGTH" ]; then
            echo "✗ Sparkle 서명 생성 실패: $SIGN_OUTPUT" >&2
            exit 1
          fi
          echo "SPARKLE_ED_SIG=$ED_SIG" >> "$GITHUB_ENV"
          echo "SPARKLE_LENGTH=$LENGTH" >> "$GITHUB_ENV"
          echo "SPARKLE_SIGNED=true" >> "$GITHUB_ENV"

      - name: Update appcast.xml on main
        if: env.SPARKLE_SIGNED == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          WORK=/tmp/appcast-repo
          rm -rf "$WORK"
          git clone --depth=1 --branch main \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$WORK"
          cd "$WORK"

          export PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")
          export DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/Calen-${VERSION}-universal.zip"
          NOTES_FILE=$(mktemp)
          gh release view "v${VERSION}" --repo "$GITHUB_REPOSITORY" --json body --jq '.body' > "$NOTES_FILE" 2>/dev/null || echo "릴리스 v${VERSION}" > "$NOTES_FILE"
          export NOTES=$(cat "$NOTES_FILE")
          rm -f "$NOTES_FILE"

          python3 - <<PYEOF
          import os, re
          path = "docs/appcast.xml"
          with open(path) as f: content = f.read()
          item = f'''        <item>
                  <title>v{os.environ["VERSION"]}</title>
                  <sparkle:version>{os.environ["BUILD_NUMBER"]}</sparkle:version>
                  <sparkle:shortVersionString>{os.environ["VERSION"]}</sparkle:shortVersionString>
                  <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                  <pubDate>{os.environ["PUB_DATE"]}</pubDate>
                  <enclosure
                      url="{os.environ["DOWNLOAD_URL"]}"
                      sparkle:edSignature="{os.environ["SPARKLE_ED_SIG"]}"
                      length="{os.environ["SPARKLE_LENGTH"]}"
                      type="application/octet-stream" />
                  <description><![CDATA[{os.environ["NOTES"]}]]></description>
              </item>
          '''
          content = content.replace("</channel>", item + "    </channel>", 1)
          with open(path, "w") as f: f.write(content)
          PYEOF

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add docs/appcast.xml
          git commit -m "release: v${VERSION} appcast entry"
          git push origin main

      - name: Create GitHub Release & upload artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          gh release create "v${VERSION}" \
            --title "Calen v${VERSION}" \
            --notes "## Calen v${VERSION}

          ### 설치 방법 (Homebrew)
          \`\`\`bash
          brew tap oyeong011/calen
          brew install --cask calen
          \`\`\`

          ### 직접 다운로드
          아래 Assets에서 DMG 파일을 받아 설치하세요." \
            "$ZIP_PATH" \
            "$DMG_PATH"

      - name: Update homebrew-calen tap
        env:
          TAP_REPO_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          git clone "https://x-access-token:${TAP_REPO_TOKEN}@github.com/oyeong011/homebrew-calen.git" /tmp/homebrew-calen
          cd /tmp/homebrew-calen
          mkdir -p Casks

          python3 - <<PYEOF
          import os
          version = os.environ["VERSION"]
          sha256  = os.environ["ZIP_SHA"]
          content = f'''cask "calen" do
            version "{version}"
            sha256 "{sha256}"

            url "https://github.com/oyeong011/Planit/releases/download/v{version}/Calen-{version}-universal.zip"
            name "Calen"
            desc "AI-powered macOS menu bar calendar with Google Calendar integration"
            homepage "https://github.com/oyeong011/Planit"

            depends_on macos: ">= :sonoma"

            app "Calen.app"

            zap trash: [
              "~/Library/Application Support/Calen",
              "~/Library/Caches/com.oy.planit",
              "~/Library/Preferences/com.oy.planit.plist",
              "~/Library/Saved Application State/com.oy.planit.savedState",
            ]
          end
          '''
          with open("Casks/calen.rb", "w") as f:
              f.write(content)
          PYEOF

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Casks/calen.rb
          git commit -m "chore: update calen cask to v${VERSION}"
          git push

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
