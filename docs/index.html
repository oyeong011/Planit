<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calen – AI-powered macOS Calendar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0d0d0d; color: #f0f0f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
    .hero { text-align: center; max-width: 600px; }
    h1 { font-size: 3rem; font-weight: 700; letter-spacing: -1px; margin-bottom: 16px; }
    .subtitle { font-size: 1.2rem; color: #aaa; margin-bottom: 40px; line-height: 1.6; }
    .badges { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 48px; }
    .badge { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 10px 20px; font-size: 0.9rem; color: #ddd; }
    .install { background: #1a1a1a; border: 1px solid #444; border-radius: 12px; padding: 24px; text-align: left; margin-bottom: 40px; }
    .install h3 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 12px; }
    .install code { font-family: "SF Mono", Monaco, monospace; font-size: 0.95rem; color: #7dd3fc; }
    .links { display: flex; gap: 20px; justify-content: center; }
    .links a { color: #888; text-decoration: none; font-size: 0.9rem; border-bottom: 1px solid #333; padding-bottom: 2px; }
    .links a:hover { color: #f0f0f0; border-color: #f0f0f0; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Calen</h1>
    <p class="subtitle">AI-powered macOS menu bar calendar.<br>Google Calendar integration with smart scheduling.</p>

    <div class="badges">
      <span class="badge">macOS 14 Sonoma+</span>
      <span class="badge">Apple Silicon &amp; Intel</span>
      <span class="badge">Google Calendar</span>
    </div>

    <div class="install">
      <h3>Install via Homebrew</h3>
      <code>brew install --cask oyeong011/calen/calen</code>
    </div>

    <div class="links">
      <a href="https://github.com/oyeong011/Planit">GitHub</a>
      <a href="https://github.com/oyeong011/Planit/releases">Releases</a>
      <a href="privacy.html">Privacy Policy</a>
    </div>
  </div>
</body>
</html>
